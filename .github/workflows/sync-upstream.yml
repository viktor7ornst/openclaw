name: Sync Fork with Upstream

on:
  schedule:
    # Každý den v 6:00 UTC (7:00 nebo 8:00 CET/CEST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Umožňuje ruční spuštění

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork via GitHub API
        uses: repo-sync/github-sync@v2
        with:
          source_repo: https://github.com/openclaw/openclaw.git
          source_branch: main
          destination_branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        id: sync

      - name: Report result
        run: |
          echo "✅ Sync attempt completed"
          echo "Fork is synced or upstream is unavailable."

